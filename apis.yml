aid: agile-methodology
name: Agile Methodology
description: A collection of resources, standards, and APIs related to agile methodology — the set of principles and frameworks that guide modern software development. Agile methodologies including 
  Scrum, Kanban, SAFe, and XP emphasize iterative delivery, customer collaboration, and adaptability. This topic covers the ecosystem of project management APIs, ceremony-facilitation tools, and 
  metrics platforms that teams use to implement agile methodology in practice.
url: https://raw.githubusercontent.com/api-evangelist/agile-methodology/refs/heads/main/apis.yml
